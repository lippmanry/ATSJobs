name: Workday Token Updater

on:
  schedule:

    - cron: '18 */4 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:

          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python -u workday_tokens.py