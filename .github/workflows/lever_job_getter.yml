name: Lever job scraper

on:
  schedule:
    
    - cron: '0 */2 * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get jobs and update mongo
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}

        run: python lever_jobs.py